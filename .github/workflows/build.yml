name: Unzip and Build Mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project files
      run: |
        unzip -o voxy-neoforge-rewrite.zip
        rm voxy-neoforge-rewrite.zip

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

- name: Build with Gradle
      run: |
        # Проверяем, есть ли подпапка, и если да — заходим в неё
        if [ -d "voxy-neoforge-rewrite" ]; then
          cd voxy-neoforge-rewrite
        elif [ -d "voxy-neoforge" ]; then
          cd voxy-neoforge
        fi

        # Запуск сборки
        chmod +x gradlew
        ./gradlew build --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"
