name: Unzip and Build Mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Шаг распаковки вашего архива прямо на сервере GitHub
    - name: Unzip project files
      run: |
        unzip -o project.zip
        rm voxy-neoforge-rewrite.zip

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: chmod +x gradlew && ./gradlew build

    - name: Upload compiled JAR
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Mod
        path: build/libs/*.jar
