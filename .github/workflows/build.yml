name: Build Mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Unzip project files
      run: |
        if [ -f "voxy-neoforge-rewrite.zip" ]; then
          unzip -o voxy-neoforge-rewrite.zip
        elif [ -f "project.zip" ]; then
          unzip -o project.zip
        fi

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: |
        if [ -d "voxy-neoforge-rewrite" ]; then cd voxy-neoforge-rewrite; fi
        chmod +x gradlew
        ./gradlew build --no-daemon -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

    - name: Upload compiled JAR
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Mod
        # Ищем во всех подпапках на любую глубину
        path: "**/build/libs/*.jar"
